<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia de Viagens</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <h1>Guia de Viagens</h1>
    <nav class="menu">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Destinos</a></li>
            <li><a href="#">Contato</a></li>
        </ul>
    </nav>
</header>

<main>

    <section class="hero">
        <h2>Descubra lugares incríveis</h2>
    </section>

    <section class="busca">
        <form>
            <input type="text" placeholder="Digite um destino">
            <button type="submit">Buscar</button>
        </form>
    </section>

    <section class="destinos">
        <h2>Destinos em destaque</h2>

        <div class="cards">

            <article class="card">
                <img src="https://picsum.photos/id/1015/300/200">
                <h3>Paris</h3>
            </article>

            <article class="card">
                <img src="https://picsum.photos/id/1016/300/200">
                <h3>Rio de Janeiro</h3>
            </article>

            <article class="card">
                <img src="https://picsum.photos/id/1018/300/200">
                <h3>Tóquio</h3>
            </article>

        </div>
    </section>

    <section class="sobre">
        <h2>Sobre</h2>
        <p>Explore os melhores destinos turísticos do mundo.</p>
    </section>

    <section class="newsletter">
        <h2>Inscreva-se</h2>
        <form>
            <input type="text" placeholder="Nome">
            <input type="email" placeholder="Email">
            <button>Enviar</button>
        </form>
    </section>

</main>

<footer class="footer">
    <p>© 2026 Guia de Viagens</p>
</footer>

</body>
</html>
